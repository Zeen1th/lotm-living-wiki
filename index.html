<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سيد الألغاز — موسوعة حية</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Arabic display + body fonts, plus the existing engraved Latin fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

<!-- content + logic BEFORE the app so window.LOTM / window.LOTMEngine exist at eval time -->
<script src="lotm-engine.js"></script>
<script src="lotm-data.js"></script>

<style>
  :root{
    --void:#080a0d;        /* near-black slate */
    --abyss:#04050a;       /* forsaken pitch black */
    --panel:#0e1218;       /* glass panel base */
    --slate:#1a212c;       /* land slate */
    --slate-2:#232c3a;
    --sea:#0a1119;         /* deep ocean */
    --sea-2:#10202a;       /* teal lift */
    --fog:#3a4655;         /* muted fog grey */
    --parchment:#d8c39a;   /* parchment tint */
    --parchment-dim:#9c8e6f;
    --crimson:#b3122b;     /* primary accent */
    --crimson-glow:#ef2d45;
    --brass:#c8a24a;       /* steampunk secondary */
    --brass-dim:#8a7330;
    --line:rgba(200,162,74,.16);
    /* red-moon tokens */
    --bloodmoon:#7a0f1c;
    --bloodmoon-glow:#c81d2e;
    --moon-halo:rgba(200,29,46,.35);
  }

  *{ box-sizing:border-box; }
  html,body,#root{ height:100%; }
  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 75% -10%, rgba(179,18,43,.10), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(200,162,74,.06), transparent 55%),
      var(--void);
    color:#cdd3da;
    font-family:'Amiri', Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* Arabic typography helpers */
  .font-deco{ font-family:'Aref Ruqaa','Cinzel Decorative', serif; }
  .font-display{ font-family:'Aref Ruqaa','Cinzel', serif; }
  .font-old{ font-family:'Amiri', Georgia, serif; }
  .eyebrow{ font-family:'Cinzel', serif; letter-spacing:.18em; }

  /* ---- glass ---- */
  .glass{
    background:linear-gradient(160deg, rgba(22,28,38,.92), rgba(10,13,18,.92));
    border:1px solid var(--line);
    backdrop-filter:blur(10px);
  }
  .hairline{ border-top:1px solid var(--line); }

  /* ---- scrollbar ---- */
  .scroller::-webkit-scrollbar{ width:9px; }
  .scroller::-webkit-scrollbar-track{ background:transparent; }
  .scroller::-webkit-scrollbar-thumb{ background:linear-gradient(var(--brass-dim),var(--crimson)); border-radius:9px; border:2px solid var(--void); }

  /* ---- map regions ---- */
  .region{ transition:fill .5s ease, stroke .5s ease, opacity .5s ease, filter .5s ease; cursor:pointer; }
  .region:hover{ filter:brightness(1.35) saturate(1.1); }
  .region.dim{ opacity:.18; }
  .region.active{ filter:brightness(1.45) drop-shadow(0 0 10px rgba(200,162,74,.45)); }

  .panZoom{ transition:transform 1s cubic-bezier(.22,.61,.18,1); transform-origin:0 0; }

  /* ---- pins ---- */
  .pin{ cursor:pointer; }
  .pin .halo{ transform-origin:center; transform-box:fill-box; }
  .pin .label-plate{ opacity:0; transform:translateY(4px); transition:opacity .3s ease, transform .3s ease; }
  .pin:hover .label-plate, .pin.open .label-plate{ opacity:1; transform:translateY(0); }
  .pin.dim{ opacity:.2; pointer-events:none; }

  @media (prefers-reduced-motion: no-preference){
    .pin .halo{ animation:beat 2.6s ease-in-out infinite; }
    .fogwisp{ animation:drift 26s ease-in-out infinite alternate; }
    .fogwisp.b{ animation-duration:34s; animation-delay:-8s; }
    .bolt{ animation:flick 5.5s steps(1) infinite; }
    .bolt.b{ animation-delay:2.7s; animation-duration:6.8s; }
    .ember{ animation:rise 9s linear infinite; }
  }
  @keyframes beat{ 0%,100%{ transform:scale(1); opacity:.55 } 50%{ transform:scale(1.7); opacity:0 } }
  @keyframes drift{ from{ transform:translateX(-18px) } to{ transform:translateX(26px) } }
  @keyframes flick{ 0%,92%,100%{ opacity:0 } 93%,95%{ opacity:.9 } 94%{ opacity:.2 } }
  @keyframes rise{ from{ transform:translateY(0); opacity:0 } 10%{opacity:.7} 90%{opacity:.2} to{ transform:translateY(-60px); opacity:0 } }

  /* ---- modal ---- */
  .backdrop{ animation:fade .35s ease both; }
  .sheet{ animation:rise-in .45s cubic-bezier(.16,.84,.3,1) both; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  @keyframes rise-in{ from{opacity:0; transform:translateY(22px) scale(.97)} to{opacity:1; transform:none} }
  @media (prefers-reduced-motion: reduce){
    .backdrop,.sheet{ animation:none !important; }
    .panZoom{ transition:none !important; }
  }

  .chip{ transition:transform .2s ease, border-color .2s ease, background .2s ease; }
  .chip:hover{ transform:translateY(-2px); border-color:var(--crimson-glow); }

  .listrow{ transition:background .25s ease, border-color .25s ease, transform .25s ease; }
  /* RTL: flip the list hover nudge */
  .listrow:hover{ transform:translateX(-3px); }

  ::selection{ background:rgba(179,18,43,.4); color:#fff; }
  .focus-ring:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }
  .vignette{ box-shadow:inset 0 0 200px 60px rgba(0,0,0,.85); pointer-events:none; }

  /* red moon over the stage */
  .bloodmoon{
    position:absolute; top:6%; left:50%; transform:translateX(-50%);
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle at 38% 38%, #e23048, var(--bloodmoon) 62%, #3a0710 100%);
    box-shadow:0 0 90px 30px var(--moon-halo), inset -14px -10px 40px rgba(0,0,0,.6);
    pointer-events:none; opacity:.85;
  }
  @media (prefers-reduced-motion: no-preference){
    .bloodmoon{ animation:moonpulse 9s ease-in-out infinite; }
  }
  @keyframes moonpulse{ 0%,100%{ box-shadow:0 0 80px 24px var(--moon-halo);} 50%{ box-shadow:0 0 120px 46px var(--moon-halo);} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/plain" id="appsrc">
const { useState, useMemo, useEffect } = React;
const LOTM = window.LOTM;
const Eng  = window.LOTMEngine;
const CAP  = Eng.encodedThrough(LOTM);

/* ----------------------------------------------------------------
   ICONS — hand-set Lucide glyphs (MIT) so the app stays self-contained
-----------------------------------------------------------------*/
const I = ({ size=20, sw=2, children, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...p}>{children}</svg>
);
const Search   = (p)=> <I {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></I>;
const X        = (p)=> <I {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></I>;
const Pin      = (p)=> <I {...p}><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></I>;
const Compass  = (p)=> <I {...p}><path d="m16.24 7.76-1.804 5.411a2 2 0 0 1-1.265 1.265L7.76 16.24l1.804-5.411a2 2 0 0 1 1.265-1.265z"/><circle cx="12" cy="12" r="10"/></I>;
const Anchor   = (p)=> <I {...p}><path d="M12 22V8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/><circle cx="12" cy="5" r="3"/></I>;
const Crown    = (p)=> <I {...p}><path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.52l4.276 3.664a1 1 0 0 0 1.516-.294z"/><path d="M5 21h14"/></I>;
const Skull    = (p)=> <I {...p}><path d="M15 22a1 1 0 0 0 1-1v-1a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20v1a1 1 0 0 0 1 1z"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="12" r="1"/></I>;
const Eye      = (p)=> <I {...p}><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></I>;
const Zap      = (p)=> <I {...p}><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></I>;
const Users    = (p)=> <I {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></I>;
const Scroll   = (p)=> <I {...p}><path d="M15 12h-5"/><path d="M15 8h-5"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/></I>;
const Landmark = (p)=> <I {...p}><path d="M10 18v-7"/><path d="M11.12 2.198a2 2 0 0 1 1.76.006l7.866 3.847c.476.233.31.949-.22.949H3.474c-.53 0-.695-.716-.22-.949z"/><path d="M14 18v-7"/><path d="M18 18v-7"/><path d="M3 22h18"/><path d="M6 18v-7"/></I>;
const Moon     = (p)=> <I {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9"/></I>;
const Scale    = (p)=> <I {...p}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></I>;
const Sun      = (p)=> <I {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></I>;
const Rope     = (p)=> <I {...p}><path d="M12 22V8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/><circle cx="12" cy="5" r="3"/></I>;

/* ----------------------------------------------------------------
   CREST — shield brand mark
-----------------------------------------------------------------*/
const accentHex = (a)=> a==='crimson' ? 'var(--crimson-glow)' : 'var(--brass)';

function Crest({ size=42, accent='crimson' }){
  const c = accentHex(accent);
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
      <path d="M24 3l17 6v13c0 12-8 19-17 23C15 41 7 34 7 22V9z"
            fill="rgba(8,10,13,.9)" stroke={c} strokeWidth="1.3"/>
      <path d="M24 9l11 4v9c0 8-5 12.5-11 15-6-2.5-11-7-11-15v-9z"
            fill="none" stroke="rgba(216,195,154,.45)" strokeWidth=".8"/>
      <circle cx="24" cy="22" r="3.4" fill={c}/>
      <path d="M24 13v18M14 22h20" stroke="rgba(216,195,154,.5)" strokeWidth=".8"/>
    </svg>
  );
}

function statusBadge(status){
  const map = { alive:'حيّ', dead:'متوفّى', unknown:'غير معروف' };
  const col = status==='dead' ? 'var(--crimson-glow)' : status==='alive' ? 'var(--brass)' : 'var(--parchment-dim)';
  return <span className="eyebrow text-[9px]" style={{ color:col }}>{map[status]||status}</span>;
}

function CharacterCard({ r, onOpen }){
  return (
    <button onClick={()=>onOpen(r.id)}
      className="listrow w-full text-right px-3 py-3 rounded-md flex items-center gap-3 mb-1.5 focus-ring"
      style={{ border:'1px solid var(--line)', background:'rgba(255,255,255,.015)' }}>
      <span className="grid place-items-center w-10 h-10 rounded-full shrink-0"
            style={{ background:'rgba(0,0,0,.45)', color:'var(--brass)', border:'1px solid var(--brass)' }}>
        <Users size={18}/>
      </span>
      <span className="min-w-0 flex-1">
        <span className="font-display block text-[15px] truncate" style={{ color:'var(--parchment)' }}>{r.name_ar}</span>
        <span className="block text-[11px] truncate" style={{ color:'var(--brass)' }}>
          {r.aliases[0] || (r.pathway && r.pathway.name_ar) || ''}
        </span>
      </span>
      {statusBadge(r.status)}
    </button>
  );
}

function CharacterDetail({ r, onClose }){
  useEffect(()=>{
    const h = (e)=>{ if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', h);
    return ()=> window.removeEventListener('keydown', h);
  }, [onClose]);
  if(!r) return null;
  const s = r.state;
  return (
    <div className="backdrop fixed inset-0 z-40 grid place-items-center p-4"
         style={{ background:'rgba(4,5,8,.74)', backdropFilter:'blur(4px)' }}
         onClick={onClose} role="dialog" aria-modal="true" aria-label={r.name_ar}>
      <div className="sheet glass w-full max-w-[600px] rounded-xl overflow-hidden relative"
           onClick={e=>e.stopPropagation()}>
        <div style={{ height:3, background:'linear-gradient(90deg,transparent,var(--crimson-glow),transparent)' }}/>
        <div className="px-6 pt-5 pb-4">
          <div className="flex items-center justify-between">
            <h2 className="font-deco text-[26px]" style={{ color:'var(--parchment)' }}>{r.name_ar}</h2>
            <button onClick={onClose} aria-label="إغلاق"
              className="w-9 h-9 grid place-items-center rounded-md focus-ring"
              style={{ background:'rgba(0,0,0,.4)', border:'1px solid var(--line)', color:'var(--parchment-dim)' }}>
              <X size={17}/>
            </button>
          </div>
          <p className="text-[13px] mt-1" style={{ color:'var(--parchment-dim)' }}>{r.name_en}</p>
          {r.aliases.length>0 && (
            <div className="flex flex-wrap gap-2 mt-3">
              {r.aliases.map(a=>(
                <span key={a} className="eyebrow text-[10px] px-2 py-1 rounded"
                  style={{ border:'1px solid var(--brass)', color:'var(--brass)' }}>{a}</span>
              ))}
            </div>
          )}
        </div>
        <div className="px-6 pb-6">
          {s && (
            <div className="hairline pt-4 grid sm:grid-cols-2 gap-3">
              {[['التسلسل', s.sequence], ['المسار', r.pathway && r.pathway.name_ar],
                ['الموقع الحالي', s.location], ['الانتماء', s.faction]].map(([k,v])=> v && (
                <div key={k} className="rounded-lg px-3 py-2" style={{ background:'rgba(0,0,0,.3)', border:'1px solid var(--line)' }}>
                  <div className="eyebrow text-[9px] mb-1" style={{ color:'var(--brass-dim)' }}>{k}</div>
                  <div className="font-display text-[14px]" style={{ color:'var(--parchment)' }}>{v}</div>
                </div>
              ))}
            </div>
          )}
          {s && s.notes && (
            <p className="text-[13.5px] leading-relaxed mt-4" style={{ color:'#c2c9d1' }}>{s.notes}</p>
          )}
          {r.events.length>0 && (
            <div className="mt-5">
              <div className="eyebrow text-[9.5px] mb-2.5" style={{ color:'var(--brass-dim)' }}>الجدول الزمني (حتى فصلك)</div>
              <ol className="relative" style={{ borderRight:'1px solid var(--line)' }}>
                {r.events.map((e,i)=>(
                  <li key={i} className="relative pr-5 pb-3">
                    <span className="absolute right-[-5px] top-1.5 w-2.5 h-2.5 rounded-full"
                          style={{ background:'var(--crimson-glow)' }}/>
                    <span className="eyebrow text-[9px]" style={{ color:'var(--brass)' }}>فصل {e.chapter}</span>
                    <p className="text-[13px] mt-0.5" style={{ color:'var(--parchment)' }}>{e.text}</p>
                  </li>
                ))}
              </ol>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CharactersSection({ chapter }){
  const [q, setQ] = useState('');
  const [openId, setOpenId] = useState(null);
  const list = useMemo(()=> Eng.visibleCharacters(LOTM.characters, chapter), [chapter]);
  const filtered = useMemo(()=>{
    const t = q.trim();
    if(!t) return list;
    return list.filter(r => (r.name_ar+r.name_en+r.aliases.join(' ')+(r.pathway?r.pathway.name_ar:'')).includes(t));
  }, [list, q]);
  const open = openId ? Eng.resolveCharacter(LOTM.characters.find(c=>c.id===openId), chapter) : null;

  return (
    <div className="h-full flex flex-col max-w-[760px] mx-auto px-4 pt-6">
      <div className="flex items-center gap-2 px-3 h-11 rounded-md mb-3"
           style={{ background:'rgba(0,0,0,.35)', border:'1px solid var(--line)' }}>
        <Search size={16} style={{ color:'var(--brass)' }}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث عن شخصية…"
               aria-label="ابحث عن شخصية"
               className="bg-transparent outline-none w-full text-[14px] focus-ring" style={{ color:'#dfe4ea' }}/>
      </div>
      <div className="eyebrow text-[9px] mb-2" style={{ color:'var(--brass-dim)' }}>
        الشخصيات المعروفة حتى الفصل {chapter} — {filtered.length}
      </div>
      <div className="scroller overflow-y-auto flex-1 pb-6">
        {filtered.length===0
          ? <p className="font-old italic text-center mt-10" style={{ color:'var(--parchment-dim)' }}>لا شخصيات مطابقة بعد.</p>
          : filtered.map(r => <CharacterCard key={r.id} r={r} onOpen={setOpenId}/>)}
      </div>
      {open && <CharacterDetail r={open} onClose={()=>setOpenId(null)}/>}
    </div>
  );
}

/* ---- reading-progress state, persisted ---- */
function useChapter(){
  const [chapter, setChapter] = useState(()=>{
    const raw = parseInt(localStorage.getItem('lotm.chapter'), 10);
    const start = Number.isFinite(raw) ? raw : CAP;
    return Math.min(CAP, Math.max(1, start));
  });
  useEffect(()=>{ localStorage.setItem('lotm.chapter', String(chapter)); }, [chapter]);
  const set = (n)=> setChapter(Math.min(CAP, Math.max(1, n|0)));
  return [chapter, set];
}

/* ---- the spoiler slider ---- */
function ChapterSlider({ chapter, setChapter }){
  const vol = (LOTM.meta.volumes||[]).find(v=> chapter>=v.start_chapter && chapter<=v.end_chapter);
  return (
    <div className="glass rounded-lg px-4 py-2.5 flex items-center gap-3">
      <span className="eyebrow text-[9px]" style={{ color:'var(--brass)' }}>أقصى فصل قرأته</span>
      <input type="range" min="1" max={CAP} value={chapter}
             onChange={e=>setChapter(parseInt(e.target.value,10))}
             aria-label="أقصى فصل قرأته"
             className="w-44 accent-[color:var(--crimson-glow)]" />
      <span className="font-display text-[15px]" style={{ color:'var(--parchment)' }}>
        {chapter} / {CAP}
      </span>
      {vol && <span className="eyebrow text-[8.5px]" style={{ color:'var(--parchment-dim)' }}>{vol.name_ar}</span>}
    </div>
  );
}

/* ----------------------------------------------------------------
   NAV BAR — RTL horizontal navigation
-----------------------------------------------------------------*/
const NAV_VIEWS = [
  { id:'general',       label:'الرئيسية' },
  { id:'characters',    label:'الشخصيات' },
  { id:'pathways',      label:'المسارات' },
  { id:'map',           label:'الخريطة' },
  { id:'organizations', label:'المنظمات' },
  { id:'roselle',       label:'مذكرات روزيل' },
  { id:'epochs',        label:'الحقب' },
];

function NavBar({ view, setView }){
  return (
    <nav className="glass shrink-0 flex items-center gap-1 px-3 py-1.5 overflow-x-auto"
         style={{ borderTop:'1px solid var(--line)', borderBottom:'1px solid var(--line)' }}
         aria-label="التنقل بين الأقسام">
      {NAV_VIEWS.map(v => {
        const active = v.id === view;
        return (
          <button key={v.id}
            onClick={()=>setView(v.id)}
            className="focus-ring shrink-0 px-3 py-1.5 rounded-md font-display text-[13px] transition-colors"
            style={{
              background: active ? 'rgba(179,18,43,.22)' : 'transparent',
              color:       active ? 'var(--crimson-glow)' : 'var(--parchment-dim)',
              border:      active ? '1px solid rgba(179,18,43,.45)' : '1px solid transparent',
            }}
            aria-current={active ? 'page' : undefined}>
            {v.label}
          </button>
        );
      })}
    </nav>
  );
}

/* ----------------------------------------------------------------
   WELCOME OVERLAY — shown only when localStorage was empty at boot
-----------------------------------------------------------------*/
function WelcomeOverlay({ chapter, setChapter, onDismiss }){
  useEffect(()=>{
    const h = (e)=>{ if(e.key==='Escape') onDismiss(); };
    window.addEventListener('keydown', h);
    return ()=> window.removeEventListener('keydown', h);
  }, [onDismiss]);

  return (
    <div className="backdrop fixed inset-0 z-50 grid place-items-center p-4"
         style={{ background:'rgba(4,5,8,.82)', backdropFilter:'blur(6px)' }}
         role="dialog" aria-modal="true" aria-label="اختر فصلك">
      <div className="sheet glass w-full max-w-[480px] rounded-xl overflow-hidden"
           onClick={e=>e.stopPropagation()}>
        <div style={{ height:3, background:'linear-gradient(90deg,transparent,var(--crimson-glow),transparent)' }}/>
        <div className="px-6 pt-6 pb-8 text-center">
          <div className="mb-4 flex justify-center">
            <Crest size={52} accent="crimson"/>
          </div>
          <h2 className="font-deco text-[24px] mb-2" style={{ color:'var(--parchment)' }}>
            إلى أي فصل وصلت؟
          </h2>
          <p className="font-old text-[14px] mb-6" style={{ color:'var(--parchment-dim)' }}>
            اختر آخر فصل قرأته لتفادي الحرق
          </p>
          <div className="flex flex-col items-center gap-3 mb-6">
            <input type="range" min="1" max={CAP} value={chapter}
                   onChange={e=>setChapter(parseInt(e.target.value,10))}
                   aria-label="أقصى فصل قرأته"
                   className="w-full accent-[color:var(--crimson-glow)]"/>
            <span className="font-display text-[18px]" style={{ color:'var(--parchment)' }}>
              {chapter} / {CAP}
            </span>
          </div>
          <button onClick={onDismiss}
            className="focus-ring px-8 py-2.5 rounded-lg font-display text-[15px]"
            style={{ background:'var(--crimson)', color:'#fff', border:'1px solid var(--crimson-glow)' }}>
            ابدأ
          </button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   PLACEHOLDER PANEL — for unbuilt views
-----------------------------------------------------------------*/
function PlaceholderPanel({ label }){
  return (
    <div className="h-full flex flex-col items-center justify-center gap-4 px-4">
      <div className="bloodmoon" style={{ position:'relative', top:'unset', left:'unset', transform:'none',
                                          width:80, height:80 }}/>
      <h2 className="font-deco text-[26px]" style={{ color:'var(--parchment)' }}>{label}</h2>
      <p className="font-old text-[15px]" style={{ color:'var(--parchment-dim)' }}>
        قيد الإنشاء — يُملأ قريبًا
      </p>
    </div>
  );
}

/* ----------------------------------------------------------------
   KIND LABELS — Arabic kind names for locations
-----------------------------------------------------------------*/
const KIND_AR = {
  region: 'منطقة',
  city:   'مدينة',
  sea:    'بحر',
};

/* ----------------------------------------------------------------
   LOCATION DETAIL PANEL — shown when a location is clicked
-----------------------------------------------------------------*/
function LocationPanel({ loc, chapter, onClose, onSelectChild }){
  useEffect(()=>{
    const h = (e)=>{ if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', h);
    return ()=> window.removeEventListener('keydown', h);
  }, [onClose]);

  if(!loc) return null;

  const state = Eng.currentState(loc, chapter);
  const blurb = state ? state.blurb_ar : 'لا توجد تفاصيل بعد';

  // Children visible at chapter
  const children = (loc.contains_ids || [])
    .map(cid => Eng.byId(LOTM.locations, cid))
    .filter(c => c && Eng.isVisible(c, chapter));

  // Characters here: string-match loc.name_ar in character's state.location
  const visChars = Eng.visibleCharacters(LOTM.characters, chapter);
  const hereChars = visChars.filter(c => {
    const st = c.state;
    return st && st.location && st.location.includes(loc.name_ar);
  });

  return (
    <div className="backdrop fixed inset-0 z-40 flex items-start justify-end p-4 pointer-events-none"
         style={{ background:'rgba(4,5,8,.55)', backdropFilter:'blur(3px)' }}>
      <div className="sheet glass w-full max-w-[360px] rounded-xl overflow-hidden pointer-events-auto"
           style={{ marginTop:'4rem' }}
           onClick={e=>e.stopPropagation()}>
        {/* accent bar */}
        <div style={{ height:3, background:'linear-gradient(90deg,transparent,var(--brass),transparent)' }}/>
        <div className="px-5 pt-4 pb-1">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <h2 className="font-deco text-[22px] leading-tight" style={{ color:'var(--parchment)' }}>{loc.name_ar}</h2>
              <p className="text-[11px] mt-0.5" style={{ color:'var(--parchment-dim)' }}>{loc.name_en}</p>
              <span className="eyebrow text-[9px] mt-1 inline-block" style={{ color:'var(--brass)' }}>
                {KIND_AR[loc.kind] || loc.kind}
              </span>
            </div>
            <button onClick={onClose} aria-label="إغلاق"
              className="shrink-0 w-8 h-8 grid place-items-center rounded-md focus-ring mt-0.5"
              style={{ background:'rgba(0,0,0,.4)', border:'1px solid var(--line)', color:'var(--parchment-dim)' }}>
              <X size={15}/>
            </button>
          </div>
        </div>
        <div className="px-5 pb-5 scroller overflow-y-auto" style={{ maxHeight:'60vh' }}>
          {/* blurb */}
          <p className="font-old text-[13.5px] leading-relaxed mt-3" style={{ color:'#c2c9d1' }}>{blurb}</p>

          {/* contains */}
          {children.length > 0 && (
            <div className="mt-4">
              <div className="eyebrow text-[9px] mb-2" style={{ color:'var(--brass-dim)' }}>ما بداخلها</div>
              <div className="flex flex-wrap gap-1.5">
                {children.map(c=>(
                  <button key={c.id}
                    onClick={()=>onSelectChild(c)}
                    className="chip focus-ring px-2.5 py-1 rounded-md text-[12px] font-display"
                    style={{ background:'rgba(0,0,0,.35)', border:'1px solid var(--line)', color:'var(--parchment)' }}>
                    {c.name_ar}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* who's here */}
          {hereChars.length > 0 && (
            <div className="mt-4">
              <div className="eyebrow text-[9px] mb-2" style={{ color:'var(--brass-dim)' }}>من هنا الآن</div>
              <div className="flex flex-wrap gap-1.5">
                {hereChars.map(c=>(
                  <span key={c.id}
                    className="px-2.5 py-1 rounded-md text-[12px] font-display"
                    style={{ background:'rgba(200,162,74,.12)', border:'1px solid rgba(200,162,74,.3)', color:'var(--brass)' }}>
                    {c.name_ar}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   MAP VIEW — data-driven interactive world map
-----------------------------------------------------------------*/
function MapView({ chapter }){
  const [focusedId, setFocusedId] = useState(null);
  const [panelLoc, setPanelLoc] = useState(null);

  // Locations visible at chapter
  const visLocs = useMemo(()=>
    (LOTM.locations || []).filter(loc => Eng.isVisible(loc, chapter)),
    [chapter]);

  // Pan/zoom math ported from atlas WorldMap
  const rawTarget = focusedId ? visLocs.find(l=>l.id===focusedId) : null;
  const target = (rawTarget && rawTarget.map) ? rawTarget : null;  // guard: only pan to mappable locations
  const s = target ? 1.85 : 1;
  const tcx = target ? target.map.cx : 500;
  const tcy = target ? target.map.cy : 320;
  const tx = target ? (500 - s*tcx) : 0;
  const ty = target ? (320 - s*tcy) : 0;
  const transform = 'translate(' + tx + 'px, ' + ty + 'px) scale(' + s + ')';

  function handlePlace(loc){
    setFocusedId(loc.id);
    setPanelLoc(loc);
  }

  function handleClose(){
    setPanelLoc(null);
  }

  function handleSelectChild(child){
    setFocusedId(child.id);
    setPanelLoc(child);
  }

  function handleReset(){
    setFocusedId(null);
    setPanelLoc(null);
  }

  // Partition locations
  const regions = visLocs.filter(l => l.kind === 'region');
  const seas    = visLocs.filter(l => l.kind === 'sea');
  const cities  = visLocs.filter(l => l.kind === 'city');

  // Is forsaken visible?
  const forsakenVisible = visLocs.some(l=>l.id==='forsaken');
  const rorstedVisible  = visLocs.some(l=>l.id==='rorsted');
  const fogseaVisible   = visLocs.some(l=>l.id==='fogsea');

  return (
    <div className="h-full w-full relative overflow-hidden" style={{ background:'var(--void)' }}>
      {/* bloodmoon stays visible behind the map */}
      <div className="bloodmoon"/>

      {/* main SVG */}
      <svg viewBox="0 0 1000 640" className="w-full h-full block absolute inset-0"
           preserveAspectRatio="xMidYMid meet"
           role="img" aria-label="خريطة عالم سيد الألغاز">
        <defs>
          <radialGradient id="mvSeaGrad" cx="50%" cy="38%" r="80%">
            <stop offset="0%" stopColor="#11212c"/>
            <stop offset="55%" stopColor="var(--sea)"/>
            <stop offset="100%" stopColor="#05080c"/>
          </radialGradient>
          <linearGradient id="mvLandGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#2b3543"/>
            <stop offset="100%" stopColor="#161d27"/>
          </linearGradient>
          <linearGradient id="mvAbyssGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#0a0c12"/>
            <stop offset="100%" stopColor="var(--abyss)"/>
          </linearGradient>
          <radialGradient id="mvStormGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stopColor="rgba(120,40,55,.30)"/>
            <stop offset="100%" stopColor="rgba(120,40,55,0)"/>
          </radialGradient>
          <filter id="mvSoft"><feGaussianBlur stdDeviation="7"/></filter>
          <filter id="mvGlowF" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="3.4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <pattern id="mvLatlong" width="56" height="56" patternUnits="userSpaceOnUse">
            <path d="M56 0H0V56" fill="none" stroke="rgba(200,162,74,.05)" strokeWidth="1"/>
          </pattern>
        </defs>

        {/* base sea */}
        <rect x="0" y="0" width="1000" height="640" fill="url(#mvSeaGrad)"/>
        <rect x="0" y="0" width="1000" height="640" fill="url(#mvLatlong)"/>

        <g className="panZoom" style={{ transform }}>
          {/* faint current lines */}
          <g stroke="rgba(120,160,180,.10)" strokeWidth="1" fill="none">
            <path d="M40 130 C 200 110, 360 150, 520 120"/>
            <path d="M60 420 C 260 400, 520 440, 760 415"/>
            <path d="M540 280 C 640 300, 720 270, 820 300"/>
          </g>

          {/* Berserk Sea storm band — static decoration */}
          <ellipse cx="500" cy="376" rx="470" ry="58" fill="url(#mvStormGrad)"/>
          <g opacity="0.7">
            <rect x="40" y="332" width="920" height="92" fill="rgba(40,60,72,.10)"/>
            <g stroke="rgba(150,180,200,.18)" strokeWidth="1.4" fill="none">
              <path d="M70 360q14-10 28 0t28 0 28 0 28 0"/>
              <path d="M360 396q14-10 28 0t28 0 28 0 28 0"/>
              <path d="M640 356q14-10 28 0t28 0 28 0 28 0"/>
              <path d="M150 410q14-10 28 0t28 0 28 0"/>
            </g>
          </g>

          {/* LAND regions from LOTM.locations (data-driven) */}
          {regions.map(loc=>{
            if(!loc.map || !loc.map.poly) return null;
            const active = focusedId === loc.id;
            const isAbyss = loc.id === 'forsaken';
            const fill   = isAbyss ? 'url(#mvAbyssGrad)' : 'url(#mvLandGrad)';
            const stroke = isAbyss ? 'rgba(120,60,75,.5)' : 'rgba(200,162,74,.30)';
            const cls = 'region' + (active ? ' active' : '');
            return (
              <polygon key={loc.id} points={loc.map.poly} className={cls}
                       fill={fill}
                       stroke={active ? 'var(--brass)' : stroke}
                       strokeWidth={active ? 2 : 1.2}
                       onClick={()=>handlePlace(loc)}/>
            );
          })}

          {/* Forsaken Land — lightning bolts and embers (static decoration, shown when visible) */}
          {forsakenVisible && (
            <g opacity="0.8" pointerEvents="none">
              <polyline className="bolt" points="905,160 898,210 916,214 902,275" fill="none"
                        stroke="var(--brass)" strokeWidth="1.6" filter="url(#mvGlowF)"/>
              <polyline className="bolt b" points="936,340 928,392 945,396 930,452" fill="none"
                        stroke="var(--crimson-glow)" strokeWidth="1.4" filter="url(#mvGlowF)"/>
              {[[875,470],[940,250],[955,420],[870,360]].map((p,i)=>(
                <circle key={i} className="ember" cx={p[0]} cy={p[1]} r="1.6" fill="rgba(200,162,74,.7)"/>
              ))}
            </g>
          )}

          {/* Rorsted archipelago islets (static decoration) */}
          {rorstedVisible && (
            <g>
              {[[568,256,7],[592,250,5],[582,276,6],[604,268,4]].map((p,i)=>(
                <ellipse key={i} cx={p[0]} cy={p[1]} rx={p[2]} ry={p[2]*0.7}
                         fill="url(#mvLandGrad)" stroke="rgba(200,162,74,.3)" strokeWidth=".8"/>
              ))}
            </g>
          )}

          {/* Fog wisps over Fog Sea */}
          {fogseaVisible && (
            <g pointerEvents="none" opacity="0.9">
              <ellipse className="fogwisp"   cx="95"  cy="200" rx="70" ry="34" fill="rgba(180,190,200,.10)" filter="url(#mvSoft)"/>
              <ellipse className="fogwisp b" cx="120" cy="250" rx="58" ry="26" fill="rgba(180,190,200,.08)" filter="url(#mvSoft)"/>
            </g>
          )}
          {/* faint fog over Loen / Backlund (always soft) */}
          <ellipse className="fogwisp b" cx="455" cy="165" rx="60" ry="22"
                   fill="rgba(190,200,210,.07)" filter="url(#mvSoft)" pointerEvents="none"/>

          {/* SEA labels — data-driven, Arabic names */}
          {seas.map(loc=>{
            const lx = loc.map ? loc.map.cx : 0;
            const ly = loc.map ? loc.map.cy : 0;
            const isBerserk = loc.id === 'berserksea';
            return (
              <text key={loc.id} x={lx} y={ly}
                    textAnchor="middle"
                    className="eyebrow"
                    style={{ fontSize: isBerserk ? 13 : 11,
                             fill:'rgba(180,196,210,.5)',
                             letterSpacing:'.3em',
                             cursor:'pointer' }}
                    onClick={()=>handlePlace(loc)}>
                {loc.name_ar}
              </text>
            );
          })}

          {/* LAND labels — data-driven, Arabic names */}
          {regions.map(loc=>{
            if(!loc.map) return null;
            const isAbyss = loc.id === 'forsaken';
            return (
              <text key={'lbl'+loc.id} x={loc.map.cx} y={loc.map.cy}
                    textAnchor="middle"
                    className="font-display"
                    style={{ fontSize: isAbyss ? 11 : 12,
                             fontWeight:600,
                             fill: isAbyss ? 'rgba(200,140,150,.65)' : 'rgba(216,195,154,.78)',
                             pointerEvents:'none',
                             letterSpacing:'.08em' }}>
                {loc.name_ar}
              </text>
            );
          })}

          {/* CITY PINS — data-driven */}
          {cities.map(loc=>{
            if(!loc.map) return null;
            const open = focusedId === loc.id;
            // cities near Forsaken use brass, others use crimson
            const isBrass = loc.id === 'rorsted' || loc.id === 'silver';
            const col = isBrass ? 'var(--brass)' : 'var(--crimson-glow)';
            return (
              <g key={loc.id}
                 className={'pin' + (open ? ' open' : '')}
                 transform={'translate(' + loc.map.cx + ',' + loc.map.cy + ')'}
                 onClick={()=>handlePlace(loc)}
                 role="button" tabIndex="0"
                 aria-label={loc.name_ar}
                 onKeyDown={(e)=>{ if(e.key==='Enter') handlePlace(loc); }}>
                <circle className="halo" r="9" fill={col} opacity="0.55"/>
                <circle r="6.5" fill="rgba(8,10,13,.95)" stroke={col} strokeWidth="2" filter="url(#mvGlowF)"/>
                <circle r="2.4" fill={col}/>
                {/* label plate */}
                <g className="label-plate" transform="translate(0,-16)">
                  <rect x="-52" y="-15" width="104" height="19" rx="3"
                        fill="rgba(8,10,13,.92)" stroke={col} strokeWidth=".8"/>
                  <text x="0" y="-2" textAnchor="middle" className="font-display"
                        style={{ fontSize:9.5, fill:'var(--parchment)', letterSpacing:'.08em', fontWeight:600 }}>
                    {loc.name_ar}
                  </text>
                </g>
              </g>
            );
          })}
        </g>
      </svg>

      {/* reset view button — shown when a location is focused */}
      {focusedId && (
        <button onClick={handleReset}
          className="absolute bottom-5 left-1/2 focus-ring px-4 py-2 rounded-lg font-display text-[13px] z-10"
          style={{ transform:'translateX(-50%)',
                   background:'rgba(8,10,13,.88)', border:'1px solid var(--brass)',
                   color:'var(--brass)', backdropFilter:'blur(6px)' }}>
          إعادة الضبط
        </button>
      )}

      {/* location detail panel */}
      {panelLoc && (
        <LocationPanel loc={panelLoc} chapter={chapter}
                       onClose={handleClose}
                       onSelectChild={handleSelectChild}/>
      )}
    </div>
  );
}

/* ----------------------------------------------------------------
   GENERAL HUB — landing page linking to all sections
-----------------------------------------------------------------*/
const HUB_CARDS = [
  { id:'characters',    label:'الشخصيات',      desc:'تصفح الشخصيات المعروفة حتى فصلك الحالي' },
  { id:'pathways',      label:'المسارات',      desc:'مسارات التحول والتسلسلات المكتشفة' },
  { id:'map',           label:'الخريطة',       desc:'مملكات وجزر العالم المرتبطة بالشخصيات' },
  { id:'organizations', label:'المنظمات',      desc:'المنظمات السرية والكنائس والأندية' },
  { id:'roselle',       label:'مذكرات روزيل',  desc:'مقتطفات من يوميات روزيل الغامضة' },
  { id:'epochs',        label:'الحقب',          desc:'الحقب الخمس الكبرى لتاريخ العالم' },
];

function GeneralHub({ setView }){
  return (
    <div className="h-full overflow-y-auto scroller">
      <div className="bloodmoon"/>
      <div className="relative z-10 max-w-[720px] mx-auto px-4 pt-16 pb-10">
        <div className="text-center mb-8">
          <div className="eyebrow text-[10px] mb-1" style={{ color:'var(--brass)' }}>سيد الألغاز</div>
          <h2 className="font-deco text-[28px]" style={{ color:'var(--parchment)' }}>الموسوعة الحية</h2>
          <p className="font-old text-[14px] mt-2" style={{ color:'var(--parchment-dim)' }}>
            دليلك الشامل لعالم المسارات — مقيَّد بفصلك الحالي
          </p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {HUB_CARDS.map(c=>(
            <button key={c.id} onClick={()=>setView(c.id)}
              className="chip glass text-right rounded-xl px-4 py-4 focus-ring"
              style={{ border:'1px solid var(--line)' }}>
              <div className="font-display text-[16px] mb-1" style={{ color:'var(--parchment)' }}>{c.label}</div>
              <div className="font-old text-[13px]" style={{ color:'var(--parchment-dim)' }}>{c.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   APP ROOT
-----------------------------------------------------------------*/
function App(){
  const [chapter, setChapter] = useChapter();
  const [view, setView] = useState('general');

  // Compute ONCE at mount whether storage was empty before useChapter wrote to it.
  // useChapter reads storage in its useState initializer and writes it in useEffect.
  // We capture the "was-empty" flag as a state initializer so it's evaluated synchronously
  // before any renders run the useChapter effect.
  const [storageWasEmpty] = useState(()=> localStorage.getItem('lotm.chapter') == null);
  const [overlayOpen, setOverlayOpen] = useState(storageWasEmpty);

  const showOverlay = overlayOpen;

  function handleDismiss(){
    setOverlayOpen(false);
  }

  function renderView(){
    switch(view){
      case 'characters': return <CharactersSection chapter={chapter}/>;
      case 'general':    return <GeneralHub setView={setView}/>;
      case 'pathways':   return <PlaceholderPanel label="المسارات"/>;
      case 'map':        return <MapView chapter={chapter}/>;
      case 'organizations': return <PlaceholderPanel label="المنظمات"/>;
      case 'roselle':    return <PlaceholderPanel label="مذكرات روزيل"/>;
      case 'epochs':     return <PlaceholderPanel label="الحقب"/>;
      default:           return <GeneralHub setView={setView}/>;
    }
  }

  return (
    <div className="h-full w-full flex flex-col">
      <header className="glass flex items-center justify-between px-4 md:px-6 h-16 shrink-0 z-20">
        <div className="flex items-center gap-3">
          <Crest size={34}/>
          <div className="leading-tight">
            <div className="eyebrow text-[9px]" style={{ color:'var(--brass)' }}>سيد الألغاز</div>
            <h1 className="font-deco text-[20px]" style={{ color:'var(--parchment)' }}>الموسوعة الحية</h1>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <ChapterSlider chapter={chapter} setChapter={setChapter}/>
          <button onClick={()=>setOverlayOpen(true)}
            className="focus-ring w-9 h-9 grid place-items-center rounded-md"
            style={{ background:'rgba(0,0,0,.4)', border:'1px solid var(--line)', color:'var(--parchment-dim)' }}
            title="الفصل" aria-label="إعادة فتح اختيار الفصل">
            <Compass size={17}/>
          </button>
        </div>
      </header>
      <NavBar view={view} setView={setView}/>
      <main className="flex-1 relative min-h-0 overflow-hidden">
        {renderView()}
      </main>
      {showOverlay && (
        <WelcomeOverlay chapter={chapter} setChapter={setChapter} onDismiss={handleDismiss}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
