<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سيد الغوامض — موسوعة حية</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Arabic display + body fonts, plus the existing engraved Latin fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

<!-- content + logic BEFORE the app so window.LOTM / window.LOTMEngine exist at eval time -->
<script src="lotm-engine.js"></script>
<script src="data/meta.js"></script>
<script src="data/characters.js"></script>
<script src="data/families.js"></script>
<script src="data/pathways.js"></script>
<script src="data/organizations.js"></script>
<script src="data/locations.js"></script>
<script src="data/eras.js"></script>
<script src="data/documents.js"></script>
<script src="data/events.js"></script>
<script src="data/glossary.js"></script>
<script src="data/artifacts.js"></script>

<style>
  :root{
    --void:#080a0d;        /* near-black slate */
    --abyss:#04050a;       /* forsaken pitch black */
    --panel:#0e1218;       /* glass panel base */
    --slate:#1a212c;       /* land slate */
    --slate-2:#232c3a;
    --sea:#0a1119;         /* deep ocean */
    --sea-2:#10202a;       /* teal lift */
    --fog:#3a4655;         /* muted fog grey */
    --parchment:#d8c39a;   /* parchment tint */
    --parchment-dim:#9c8e6f;
    --crimson:#b3122b;     /* primary accent */
    --crimson-glow:#ef2d45;
    --brass:#c8a24a;       /* steampunk secondary */
    --brass-dim:#8a7330;
    --line:rgba(200,162,74,.16);
    /* red-moon tokens */
    --bloodmoon:#7a0f1c;
    --bloodmoon-glow:#c81d2e;
    --moon-halo:rgba(200,29,46,.35);
  }

  *{ box-sizing:border-box; }
  html,body,#root{ height:100%; }
  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 75% -10%, rgba(179,18,43,.10), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(200,162,74,.06), transparent 55%),
      var(--void);
    color:#cdd3da;
    font-family:'Scheherazade New', Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* Arabic typography helpers */
  .font-deco{ font-family:'Cinzel Decorative', serif; }
  .font-display{ font-family:'Cinzel', serif; }
  .font-old{ font-family:'Amiri', Georgia, serif; }
  .eyebrow{ font-family:'Cinzel', serif; letter-spacing:.18em; }

  /* ---- glass ---- */
  .glass{
    background:linear-gradient(160deg, rgba(22,28,38,.92), rgba(10,13,18,.92));
    border:1px solid var(--line);
    backdrop-filter:blur(10px);
  }
  .hairline{ border-top:1px solid var(--line); }

  /* ---- scrollbar ---- */
  .scroller::-webkit-scrollbar{ width:9px; }
  .scroller::-webkit-scrollbar-track{ background:transparent; }
  .scroller::-webkit-scrollbar-thumb{ background:linear-gradient(var(--brass-dim),var(--crimson)); border-radius:9px; border:2px solid var(--void); }

  /* ---- map regions ---- */
  .region{ transition:fill .5s ease, stroke .5s ease, opacity .5s ease, filter .5s ease; cursor:pointer; }
  .region:hover{ filter:brightness(1.35) saturate(1.1); }
  .region.dim{ opacity:.18; }
  .region.active{ filter:brightness(1.45) drop-shadow(0 0 10px rgba(200,162,74,.45)); }

  .panZoom{ transition:transform 1s cubic-bezier(.22,.61,.18,1); transform-origin:0 0; }

  /* ---- pins ---- */
  .pin{ cursor:pointer; }
  .pin .halo{ transform-origin:center; transform-box:fill-box; }
  .pin .label-plate{ opacity:0; transform:translateY(4px); transition:opacity .3s ease, transform .3s ease; }
  .pin:hover .label-plate, .pin.open .label-plate{ opacity:1; transform:translateY(0); }
  .pin.dim{ opacity:.2; pointer-events:none; }

  /* ---- image-map markers (HTML overlay) ---- */
  .mappin{ display:flex; flex-direction:column; align-items:center; }
  .mappin .pin-dot{
    width:11px; height:11px; border-radius:50%;
    background:rgba(8,10,13,.95);
    border:2px solid var(--pin, var(--crimson-glow));
    box-shadow:0 0 6px 1px rgba(0,0,0,.6);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .mappin .pin-label{
    margin-top:3px; padding:1px 7px; border-radius:4px;
    background:rgba(8,10,13,.88); border:1px solid var(--pin, var(--crimson-glow));
    font-family:'Cinzel', serif; font-size:10px; letter-spacing:.06em; white-space:nowrap;
    opacity:0; transform:translateY(4px);
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  .mappin:hover .pin-label, .mappin.open .pin-label,
  .mappin:focus-visible .pin-label{ opacity:1; transform:translateY(0); }
  .mappin:hover .pin-dot, .mappin.open .pin-dot{ transform:scale(1.25); box-shadow:0 0 10px 2px var(--pin); }
  /* seas/regions: smaller, dimmer dot — they're label-first, not a precise point */
  .mappin:not(.city) .pin-dot{ width:7px; height:7px; border-width:1.5px; opacity:.85; }
  .mappin:not(.city) .pin-label{
    background:transparent; border-color:transparent;
    color:rgba(216,195,154,.62); font-size:11px; letter-spacing:.18em;
    text-shadow:0 1px 4px rgba(0,0,0,.9);
    opacity:.85; transform:none;
  }
  .mappin:not(.city):hover .pin-label{ color:var(--brass); opacity:1; }
  @media (prefers-reduced-motion: no-preference){
    .mappin.city .pin-dot{ animation:beat 2.6s ease-in-out infinite; }
  }

  @media (prefers-reduced-motion: no-preference){
    .pin .halo{ animation:beat 2.6s ease-in-out infinite; }
    .fogwisp{ animation:drift 26s ease-in-out infinite alternate; }
    .fogwisp.b{ animation-duration:34s; animation-delay:-8s; }
    .bolt{ animation:flick 5.5s steps(1) infinite; }
    .bolt.b{ animation-delay:2.7s; animation-duration:6.8s; }
    .ember{ animation:rise 9s linear infinite; }
  }
  @keyframes beat{ 0%,100%{ transform:scale(1); opacity:.55 } 50%{ transform:scale(1.7); opacity:0 } }
  @keyframes drift{ from{ transform:translateX(-18px) } to{ transform:translateX(26px) } }
  @keyframes flick{ 0%,92%,100%{ opacity:0 } 93%,95%{ opacity:.9 } 94%{ opacity:.2 } }
  @keyframes rise{ from{ transform:translateY(0); opacity:0 } 10%{opacity:.7} 90%{opacity:.2} to{ transform:translateY(-60px); opacity:0 } }

  /* ---- modal ---- */
  .backdrop{ animation:fade .35s ease both; }
  .sheet{ animation:rise-in .45s cubic-bezier(.16,.84,.3,1) both; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  @keyframes rise-in{ from{opacity:0; transform:translateY(22px) scale(.97)} to{opacity:1; transform:none} }
  @media (prefers-reduced-motion: reduce){
    .backdrop,.sheet{ animation:none !important; }
    .panZoom{ transition:none !important; }
  }

  .chip{ transition:transform .2s ease, border-color .2s ease, background .2s ease; }
  .chip:hover{ transform:translateY(-2px); border-color:var(--crimson-glow); }

  .listrow{ transition:background .25s ease, border-color .25s ease, transform .25s ease; }
  /* RTL: flip the list hover nudge */
  .listrow:hover{ transform:translateX(-3px); }

  ::selection{ background:rgba(179,18,43,.4); color:#fff; }
  .focus-ring:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }
  .vignette{ box-shadow:inset 0 0 200px 60px rgba(0,0,0,.85); pointer-events:none; }

  /* red moon over the stage */
  .bloodmoon{
    position:absolute; top:6%; left:50%; transform:translateX(-50%);
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle at 38% 38%, #e23048, var(--bloodmoon) 62%, #3a0710 100%);
    box-shadow:0 0 90px 30px var(--moon-halo), inset -14px -10px 40px rgba(0,0,0,.6);
    pointer-events:none; opacity:.85;
  }
  @media (prefers-reduced-motion: no-preference){
    .bloodmoon{ animation:moonpulse 9s ease-in-out infinite; }
  }
  @keyframes moonpulse{ 0%,100%{ box-shadow:0 0 80px 24px var(--moon-halo);} 50%{ box-shadow:0 0 120px 46px var(--moon-halo);} }
</style>
</head>
<body>
<div id="root"></div>

<!-- APP SCRIPTS — loaded via Babel standalone, order: base → views → chrome → main -->
<script>
(function(){
  var APP_FILES = [
    'app/base.js','app/characters.js','app/pathways.js','app/map.js',
    'app/organizations.js','app/artifacts.js','app/roselle.js','app/epochs.js',
    'app/chrome.js','app/main.js'
  ];
  var BABEL_OPTS = { presets: [['react', { runtime: 'classic' }]] };
  function loadNext(i){
    if(i >= APP_FILES.length) return;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', APP_FILES[i], true);
    xhr.onload = function(){
      if(xhr.status !== 200){ console.error('Failed to load', APP_FILES[i], xhr.status); return; }
      try {
        var code = Babel.transform(xhr.responseText, BABEL_OPTS).code;
        (0, eval)(code);
      } catch(e){
        console.error('Error in', APP_FILES[i], e);
      }
      loadNext(i + 1);
    };
    xhr.onerror = function(){ console.error('XHR error loading', APP_FILES[i]); };
    xhr.send();
  }
  loadNext(0);
})();
</script>

</body>
</html>
